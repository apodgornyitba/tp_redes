name: CI/CD Pipeline - The Store

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'charts/**'
      - 'local.sh'
      - '.github/workflows/main.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'charts/**'
      - 'local.sh'
      - '.github/workflows/main.yml'

permissions:
  contents: read
  packages: write

jobs:
  static-validation:
    name: Static Validation (Linting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'

      - name: Lint Helm Chart
        run: |
          helm lint charts/the-store/

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "src/*/Dockerfile"
          recursive: true
          ignore: "DL3007,DL3008,DL3018,DL4006,DL3041,DL3059"

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            catalog: 'src/catalog/**'
            cart: 'src/cart/**'
            checkout: 'src/checkout/**'
            orders: 'src/orders/**'
            ui: 'src/ui/**'
            global:
              - 'charts/**'
              - 'local.sh'
              - '.github/workflows/main.yml'

      - name: Set Matrix Output
        id: set-matrix
        run: |
          CHANGES='${{ steps.filter.outputs.changes }}'
          if echo '${{ steps.filter.outputs.global }}' | grep -q 'true' || [ "$CHANGES" = '[]' ] || [ -z "$CHANGES" ]; then
            echo "services=[\"catalog\", \"cart\", \"checkout\", \"orders\", \"ui\"]" >> $GITHUB_OUTPUT
          else
            # Filter out 'global' from the changes array to keep only service names
            SERVICES=$(echo $CHANGES | jq -c 'map(select(. != "global"))')
            if [ "$SERVICES" = '[]' ]; then
              echo "services=[\"catalog\", \"cart\", \"checkout\", \"orders\", \"ui\"]" >> $GITHUB_OUTPUT
            else
              echo "services=${SERVICES}" >> $GITHUB_OUTPUT
            fi
          fi

  build-and-push:
    name: Build & Push to GHCR
    needs: [static-validation, detect-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR image prefix (lowercase)
        id: ghcr
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.prefix }}/the-store-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-and-test:
    name: CD (Deploy & E2E Test)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set GHCR image prefix (lowercase)
        id: ghcr
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Pull and Load Images from GHCR
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="sha-${SHA_SHORT}"
          GHCR_PREFIX="${{ steps.ghcr.outputs.prefix }}"
          
          for service in catalog cart checkout orders ui; do
            IMAGE_GHCR_SHA="${GHCR_PREFIX}/the-store-$service:${TAG}"
            IMAGE_GHCR_LATEST="${GHCR_PREFIX}/the-store-$service:latest"
            
            echo "Attempting to pull $IMAGE_GHCR_SHA..."
            if docker pull $IMAGE_GHCR_SHA; then
              IMAGE_TO_TAG=$IMAGE_GHCR_SHA
            else
              echo "$IMAGE_GHCR_SHA not found (likely not rebuilt in this commit). Pulling $IMAGE_GHCR_LATEST instead..."
              docker pull $IMAGE_GHCR_LATEST
              IMAGE_TO_TAG=$IMAGE_GHCR_LATEST
            fi
            
            # Tag locally so local.sh Helm deployment can find it without GHCR credentials in Kind
            docker tag $IMAGE_TO_TAG the-store-$service:${TAG}
            
            echo "Loading the-store-$service:${TAG} into Kind..."
            kind load docker-image the-store-$service:${TAG} --name the-store
          done

      - name: Deploy Services via Helm
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="sha-${SHA_SHORT}"
          
          # Deploy with Helm using the correct commit-specific image tag
          helm upgrade --install the-store ./charts/the-store --namespace the-store --create-namespace --set global.imageTag=${TAG}

      - name: Wait for deployments to be ready
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "Waiting for rollout to complete..."
          for dep in carts catalog checkout orders ui; do
            kubectl rollout status deployment/$dep --namespace the-store --timeout=300s
          done

      - name: Run E2E Tests (Gatekeeper)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! ./local.sh e2e-test; then
            echo "::error::E2E Tests failed! Initiating automatic Helm rollback to protect production..."
            REVISIONS=$(helm history the-store --namespace the-store 2>/dev/null | grep -c "^[0-9]" || echo "0")
            if [ "$REVISIONS" -gt 1 ]; then
              helm rollback the-store --namespace the-store
              echo "Successfully rolled back to the previous stable revision."
            else
              echo "No previous revision found to rollback to. Uninstalling failed release..."
              helm uninstall the-store --namespace the-store
            fi
            exit 1
          fi

      - name: Clean up Cypress Screenshots (Fix Permissions)
        if: always()
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace alpine sh -c "rm -rf src/e2e/cypress/screenshots src/e2e/cypress/videos"
