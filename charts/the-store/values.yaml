# Global values that can be shared or overridden
global:
  imageTag: latest
  namespace: the-store

# Service specific configuration overrides
catalog:
  replicaCount: 1
  image:
    repository: the-store-catalog
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 256m
      memory: 256Mi
  persistence:
    provider: in-memory
    dbUser: catalog
    dbPassword: Vxq1xLRUKsYWvb4m
  service:
    type: ClusterIP
    port: 80
  readinessProbe:
    path: /health
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

cart:
  replicaCount: 1
  image:
    repository: the-store-cart
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 256m
      memory: 512Mi
  persistence:
    provider: in-memory
  service:
    type: ClusterIP
    port: 80
  readinessProbe:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

orders:
  replicaCount: 1
  image:
    repository: the-store-orders
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 256m
      memory: 512Mi
  persistence:
    provider: in-memory
    messaging: in-memory
    dbUser: orders
    dbPassword: qNHkHP8fTr94VI6n
  service:
    type: ClusterIP
    port: 80
  readinessProbe:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

checkout:
  replicaCount: 1
  image:
    repository: the-store-checkout
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 128m
      memory: 256Mi
  persistence:
    provider: in-memory
  service:
    type: ClusterIP
    port: 80
  readinessProbe:
    path: /health
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

ui:
  replicaCount: 1
  image:
    repository: the-store-ui
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 128m
      memory: 512Mi
  endpoints:
    catalog: http://catalog
    carts: http://carts
    checkout: http://checkout
    orders: http://orders
  service:
    type: ClusterIP
    port: 80
  readinessProbe:
    path: /actuator/health/readiness
    initialDelaySeconds: 10
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  ingress:
    enabled: true
    className: nginx
    host: localhost
